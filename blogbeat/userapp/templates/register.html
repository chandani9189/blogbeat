{% extends 'master.html' %}

{% block "main" %}
<!-- Register page main section -->
<main class="register-page">
  <section class="register-card">
    <!-- Register form heading -->
    <div class="register-brand">Blog<span>Beat</span></div>
    <h1>Create your account</h1>
    <p>Add your details below to get started.</p>

    <!-- User registration form -->
    <form method="post" class="register-form">
      {% csrf_token %}

      <div class="form-row">
        <div class="form-group">
          <label for="fname">First Name</label>
          <input type="text" id="fname" name="fname" placeholder="e.g. Chandu" />
        </div>

        <div class="form-group">
          <label for="lname">Last Name</label>
          <input type="text" id="lname" name="lname" placeholder="e.g. Sharma" />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Choose a username" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a strong password" />
      </div>

      <div class="form-actions">
        <button type="submit" class="create-btn">Create Account</button>
        <button type="reset" class="reset-btn">Reset</button>
      </div>
    </form>

    <div class="login-text">
      Already have an account? <a href="/accounts/login/">Login here</a>
    </div>
  </section>
</main>
{% endblock %}
